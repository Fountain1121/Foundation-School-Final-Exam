<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marker Dashboard — Foundation School Examination</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page" id="gatePage">
  <div class="sheet" style="max-width:420px">
    <div class="masthead">
      <svg class="mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="18.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M20 10V30M12 15H28" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <p class="church">Love Country Church</p>
      <h1 style="font-size:22px">Marker Dashboard</h1>
    </div>
    <div class="login-body">
      <div class="field">
        <label for="passInput">Passcode</label>
        <input type="text" id="passInput" autocomplete="off">
      </div>
      <button class="btn btn-primary btn-block" id="gateBtn" type="button">View Submissions</button>
      <p class="error-text" id="gateError"></p>
    </div>
  </div>
</div>

<div id="dashboardPage" style="display:none">
  <div class="admin-toolbar">
    <h1>Submissions</h1>
    <span class="stat-pill" id="countPill">Loading&hellip;</span>
  </div>
  <div class="sub-list" id="subList"></div>
</div>

<div class="detail-overlay" id="detailOverlay" style="display:none">
  <div class="detail-panel">
    <div class="close-row"><button id="closeDetail">Close &#10005;</button></div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/questions.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
